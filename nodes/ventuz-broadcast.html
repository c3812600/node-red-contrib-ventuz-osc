<script type="text/javascript">
    RED.nodes.registerType('ventuz-broadcast', {
        category: 'network',
        color: '#a6bbcf',
        defaults: {
            name: { value: "" },
            host: { value: "127.0.0.1", required: true },
            port: { value: 9000, required: true, validator: RED.validators.number() },
            address: { value: "/ventuz/broadcast", required: true }
        },
        inputs: 1,
        outputs: 1,
        icon: "bridge.svg",
        label: function() {
            return this.name || this.host + ':' + this.port;
        },
        paletteLabel: "ventuz broadcast"
    });
</script>

<script type="text/html" data-template-name="ventuz-broadcast">
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="Name">
    </div>
    <div class="form-row">
        <label for="node-input-host"><i class="fa fa-globe"></i> Host</label>
        <input type="text" id="node-input-host" placeholder="127.0.0.1">
    </div>
    <div class="form-row">
        <label for="node-input-port"><i class="fa fa-plug"></i> Port</label>
        <input type="text" id="node-input-port" placeholder="9000">
    </div>
    <div class="form-row">
        <label for="node-input-address"><i class="fa fa-map-marker"></i> OSC Address</label>
        <input type="text" id="node-input-address" placeholder="/ventuz/broadcast">
    </div>
</script>

<script type="text/html" data-help-name="ventuz-broadcast">
    <p>Ventuz Broadcast 节点</p>
    <h3>Inputs</h3>
    <dl class="message-properties">
        <dt>payload <span class="property-type">string | array | object</span></dt>
        <dd>OSC 消息内容</dd>
        <dt>topic <span class="property-type">string</span></dt>
        <dd>OSC 地址（可选，覆盖节点配置）</dd>
    </dl>
    <h3>Outputs</h3>
    <dl class="message-properties">
        <dt>payload <span class="property-type">string | array | object</span></dt>
        <dd>原始消息</dd>
    </dl>
    <h3>Details</h3>
    <p>向 Ventuz 应用发送 OSC 消息。配置 Ventuz 主机地址、端口和 OSC 地址。</p>
    <h3>Examples</h3>
    <pre>[{"topic": "/ventuz/broadcast", "payload": "Hello Ventuz"}]</pre>
</script>
